name: Upload Artifacts
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
    - name: Download raw report
      uses: actions/download-artifact@v4
      with:
        name: playwright-report-${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        run-id: ${{ github.event.workflow_run.id }}
        path: playwright-report/
    - name: Resolve artifact name
      id: artifact-name
      env:
        PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        RUN_ID: ${{ github.event.workflow_run.id }}
      run: |
        if [ -n "$PR_NUMBER" ]; then
          echo "name=playwright-report-pr-$PR_NUMBER" >> $GITHUB_OUTPUT
        else
          echo "name=playwright-report-run-$RUN_ID" >> $GITHUB_OUTPUT
        fi
    - name: Upload report artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.artifact-name.outputs.name }}
        path: playwright-report/
        retention-days: 30
